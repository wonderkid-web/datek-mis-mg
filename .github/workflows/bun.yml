name: Bun CI

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initiate Prisma
        run: bunx prisma generate

      - name: Build project
        run: bun run build

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy
          cp -R .next deploy/.next
          cp -R public deploy/public
          cp -R node_modules deploy/node_modules
          cp -R prisma deploy/prisma
          cp package.json deploy/package.json
          cp bun.lockb deploy/bun.lockb
          cp next.config.ts deploy/next.config.ts
          cp ecosystem.config.cjs deploy/ecosystem.config.cjs
          tar -czf release.tar.gz -C deploy .

      - name: Upload release archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: release.tar.gz
          target: /tmp

      - name: Extract release and restart PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p /home/wonderkid/datek-mis-mg
            rm -rf /home/wonderkid/datek-mis-mg/.next
            tar -xzf /tmp/release.tar.gz -C /home/wonderkid/datek-mis-mg
            rm -f /tmp/release.tar.gz
            cd /home/wonderkid/datek-mis-mg
            if pm2 describe datek >/dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --only datek --update-env
            else
              pm2 start ecosystem.config.cjs --only datek
            fi
            pm2 save
