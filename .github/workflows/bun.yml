name: Bun CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/wonderkid/datek-mis-mg

    steps:
      - uses: actions/checkout@v4

      - name: Pull newest update from git
        run: git pull origin main

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initiate Prisma
        run: bunx prisma generate

      - name: Build standalone project
        run: bun run build:standalone

      - name: Reload standalone project
        run: |
          if pm2 describe datek >/dev/null 2>&1; then
            pm2 reload ecosystem.config.cjs --only datek --update-env
          else
            pm2 start ecosystem.config.cjs --only datek
          fi
          pm2 save
