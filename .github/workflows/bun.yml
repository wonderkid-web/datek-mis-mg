name: Bun CI

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initiate Prisma
        run: bunx prisma generate

      - name: Build project
        run: bun run build

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy
          cp -R .next deploy/.next
          cp -R public deploy/public
          cp -R node_modules deploy/node_modules
          cp -R prisma deploy/prisma
          cp package.json deploy/package.json
          cp bun.lockb deploy/bun.lockb
          cp next.config.ts deploy/next.config.ts
          cp ecosystem.config.cjs deploy/ecosystem.config.cjs
          tar -czf release.tar.gz -C deploy .

      - name: Upload release archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: release.tar.gz
          target: /tmp

      - name: Extract release and restart PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:$HOME/.bun/bin:$PATH"
            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
            fi
            if [ -f "$HOME/.profile" ]; then
              . "$HOME/.profile"
            fi
            if [ -f "$HOME/.bashrc" ]; then
              . "$HOME/.bashrc"
            fi
            if [ -f "$HOME/.zshrc" ]; then
              . "$HOME/.zshrc"
            fi
            PM2_BIN="$(command -v pm2 || true)"
            if [ -z "$PM2_BIN" ]; then
              echo "pm2 not found on VPS PATH"
              exit 1
            fi
            mkdir -p /home/wonderkid/datek-mis-mg
            rm -rf /home/wonderkid/datek-mis-mg/.next
            tar -xzf /tmp/release.tar.gz -C /home/wonderkid/datek-mis-mg
            rm -f /tmp/release.tar.gz
            cd /home/wonderkid/datek-mis-mg
            if "$PM2_BIN" describe datek >/dev/null 2>&1; then
              "$PM2_BIN" reload ecosystem.config.cjs --only datek --update-env
            else
              "$PM2_BIN" start ecosystem.config.cjs --only datek
            fi
            "$PM2_BIN" save
